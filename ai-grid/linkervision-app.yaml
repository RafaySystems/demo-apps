---
apiVersion: v1
kind: ConfigMap
metadata:
  name: linker-vlm-config
  labels:
    app: linker-vlm
data:
  MODEL: "/models/Qwen3-VL-32B-Thinking-FP8"
  GPU_MEMORY_UTILIZATION: "0.8"
  MAX_MODEL_LEN: "32768"
  MAX_NUM_BATCHED_TOKENS: "16384"
  SYSTEM_PROMPT: "You are an intelligent visual assistant."
  REASONING_PARSER: ""
  APP_PORT: "8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linker-vlm
  labels:
    app: linker-vlm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: linker-vlm
  template: 
    metadata:
      labels:
        app: linker-vlm
    spec:
      containers:
        - name: linker-vlm
          image: registry.dev.rafay-edge.net/rafay/linker-vlm-app:v2
          imagePullPolicy: Always
          ports:
            - name: app
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: linker-vlm-config
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "0"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1
              memory: "16Gi"
              cpu: "4"
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: models
          hostPath:
            path: /mnt/nfs/models
            type: Directory
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: linker-vlm-service
  labels:
    app: linker-vlm
spec:
  type: NodePort
  selector:
    app: linker-vlm
  ports:
    - name: app
      port: 8081
      targetPort: 8081
      nodePort: 30081
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linker-vlm-app
  labels:
    app: linker-vlm-app
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{{ .global.Rafay.WorkloadName }}}-{{{ .global.Rafay.ClusterName }}}.{{{ .global.Rafay.ClusterLabels.ingressDomain }}}
      secretName: nvidia-tls
  rules:
    - host: {{{ .global.Rafay.WorkloadName }}}-{{{ .global.Rafay.ClusterName }}}.{{{ .global.Rafay.ClusterLabels.ingressDomain }}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linker-vlm-service
                port:
                  number: 8081



