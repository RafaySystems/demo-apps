apiVersion: v1
kind: Service
metadata:
  name: echo
spec:
  ports:
  - port: 80
    targetPort: 5678
  selector:
    app: echo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
spec:
  selector:
    matchLabels:
      app: echo
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        app: echo
        version: "1.0"
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo
        args:
        - "-text=Prod"
        ports:
        - containerPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-ingress
  labels:
    app: echo
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{{ .global.Rafay.WorkloadName }}}-{{{ .global.Rafay.ClusterName }}}.{{{ .global.Rafay.ClusterLabels.ingressDomain }}}
      secretName: nvidia-tls
  rules:
    - host: {{{ .global.Rafay.WorkloadName }}}-{{{ .global.Rafay.ClusterName }}}.{{{ .global.Rafay.ClusterLabels.ingressDomain }}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo
                port:
                  number: 80